<!DOCTYPE html>
<html>
<head>
    <title>AutoMall - Add Car</title>
     <!-- for CSS -->
   <link rel="stylesheet" href="add-car-style.css">
</head>
<body>
    <h1>AutoMall</h1>
    <h2>Add a Car for Sale</h2>
    <p>Fill in the details about the car you want to sell.</p>
    <form id="addCarForm">
         <!-- car'color -->
        <div>
            <label>Car Color:</label>
            <input type="text" id="colorInput">
        </div>
        <!-- model -->
        <div>
            <label>Car Model:</label>
            <input type="text" id="modelInput">
        </div>
        <!-- car'number -->
        <div>
            <label>Year:</label>
            <input type="number" id="yearInput">
        </div>
        <!-- seller city -->
        <div>
            <label>location:</label>
            <input type="text" id="locationInput">
        </div>
        <div>
            <label>Price (RMB):</label>
            <input type="number" id="priceInput">
        </div>
        <!-- car images -->
        <div>
            <label>Image of car :</label>
            <input type="file" id="pictureInput">
        </div>
        <button>Add Car</button>
    </form>
</body>
</html>
