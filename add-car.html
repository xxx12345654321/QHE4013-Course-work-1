<!DOCTYPE html>
<html>
<head>
    <title>AutoMall - Add Car</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="add-car-style.css">
</head>
<body>
    <div class="back-home-container">
        <a href="index.html" class="back-home-btn">← Back to Home</a>
    </div>
    <div class="container">
        <h1>Add a Car for Sale</h1>
        <p>Fill in the details about the car you want to sell.</p>
        <div class="form-container">
            <form id="addCarForm">
                <div class="form-group">
                    <label for="makeInput">Car Brand (Make):</label>
                    <input type="text" id="makeInput" name="make" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="modelInput">Car Model:</label>
                    <input type="text" id="modelInput" name="model" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="yearInput">Year:</label>
                    <input type="number" id="yearInput" name="year" class="form-control" min="1990" max="2026" required>
                </div>
                <div class="form-group">
                    <label for="priceInput">Price (RMB):</label>
                    <input type="number" id="priceInput" name="price" class="form-control" step="0.01" min="0.01" required>
                </div>
                <div class="form-group">
                    <label for="descriptionInput">Description:</label>
                    <textarea id="descriptionInput" name="description" class="form-control" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label for="pictureInput">Image of car:</label>
                    <input type="file" id="pictureInput" name="car_image" class="form-control" accept="image/jpeg,image/png,image/webp">
                </div>
                <button type="submit" class="btn">Add Car</button>
            </form>
            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="add-car-JS.js"></script>
</body>
</html>
