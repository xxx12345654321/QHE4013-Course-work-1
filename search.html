<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>search</title>
    <link rel="stylesheet" href="stylereglog.css">
</head>
<body>
    <button onclick="location.href='index.html'">home page</button>

    <h2>search</h2>
    <form id="searchform">
        <div>
            <label>type of car</label><br>
            <input type="text" id="type" placeholder="type you want">
        </div>
        <br>

        <div>
            <label>year</label><br>
            <select id="year">
                <option value="">all year</option>
                <option value="2026">2026</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
                <option value="2022">2022</option>
                <option value="2021">2021</option>
                <option value="2020">2020</option>         
                <option value="2019">2019</option>
                <option value="2018">2018</option>
                <option value="2017">2017</option>
                <option value="2016">2016</option>
            </select>
        </div>
        <br>

        <button type="button" onclick="search()">search</button>
    </form>

    <script>
    function search() {
    
        let type = document.getElementById('type').value;
        let year = document.getElementById('year').value;
        location.href = `result.html?type=${type}&year=${year}`;
    }
    </script>
</body>
</html>
